<!DOCTYPE html>
<html>
<head>
<title>Elite Mindset</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="text-align:center;font-family:Arial;background:#111;color:white;">

<h1>🔥 Elite Mindset</h1>

<div id="quoteBox" style="margin:20px;padding:20px;background:#222;border-radius:10px;">
Click generate
</div>

<button onclick="generate()">Generate Quote</button>

<script>
let quotes = [
"Discipline beats motivation",
"Stay silent, let success speak",
"Pain today, power tomorrow",
"Build your future daily"
];

function generate(){
document.getElementById("quoteBox").innerText =
"🔥 " + quotes[Math.floor(Math.random()*quotes.length)];
}
</script>

</body>
</html>
